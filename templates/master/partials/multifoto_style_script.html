<style>
.photo-section,
.preview-wrapper {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid #e5ebf3;
}

.photo-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
}

.photo-section h3,
.preview-wrapper h3 {
    margin: 0;
    font-size: 20px;
    color: #0f172a;
    font-weight: 900;
}

.photo-section p,
.preview-wrapper p {
    margin: 6px 0 0;
    color: #64748b;
    font-size: 14px;
}

.asset-photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
}

.asset-photo-card {
    border: 1px solid #dbe5f0;
    border-radius: 16px;
    background: #ffffff;
    overflow: hidden;
    box-shadow: 0 10px 24px rgba(16, 42, 91, 0.08);
    transition: all 0.2s ease;
}

.asset-photo-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 32px rgba(16, 42, 91, 0.12);
}

.asset-photo-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    display: block;
    background: #f1f5f9;
}

.asset-photo-meta {
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: 12px;
    color: #64748b;
}

.asset-photo-meta div {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
}

.asset-photo-meta strong {
    font-size: 12px;
    color: #0f172a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.asset-photo-meta span {
    font-size: 11px;
    color: #64748b;
}

.photo-delete-btn {
    border: 0;
    background: #fee2e2;
    color: #991b1b;
    font-weight: 800;
    border-radius: 999px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
}

.photo-delete-btn:hover {
    background: #fecaca;
}

.empty-photo-state {
    border: 1px dashed #bfd0e5;
    background: #f8fbff;
    color: #64748b;
    border-radius: 16px;
    padding: 22px;
    text-align: center;
    font-size: 14px;
}

input[type="file"][multiple] {
    padding: 14px;
    background: #f8fbff;
    cursor: pointer;
}

.preview-label {
    padding: 10px 12px;
    font-size: 12px;
    color: #64748b;
    background: #ffffff;
    border-top: 1px solid #e5ebf3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const fileInput = document.querySelector('input[name="{{ input_name }}"]');
    const previewWrapper = document.getElementById('preview-wrapper');
    const previewGrid = document.getElementById('preview-grid');

    if (!fileInput || !previewWrapper || !previewGrid) {
        return;
    }

    fileInput.addEventListener('change', function () {
        previewGrid.innerHTML = '';

        const files = Array.from(fileInput.files || []);

        if (files.length === 0) {
            previewWrapper.style.display = 'none';
            return;
        }

        previewWrapper.style.display = 'block';

        files.forEach(function (file) {
            if (!file.type.startsWith('image/')) {
                return;
            }

            const reader = new FileReader();

            reader.onload = function (event) {
                const card = document.createElement('div');
                card.className = 'asset-photo-card preview-card';

                const img = document.createElement('img');
                img.src = event.target.result;
                img.alt = file.name;

                const label = document.createElement('div');
                label.className = 'preview-label';
                label.textContent = file.name;

                card.appendChild(img);
                card.appendChild(label);
                previewGrid.appendChild(card);
            };

            reader.readAsDataURL(file);
        });
    });
});
</script>
